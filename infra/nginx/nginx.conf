# Edge layer in front of the NestJS gateway.
# Responsibilities here: TLS termination, load balancing across gateway
# replicas, connection-level rate limiting (defense in depth on top of the
# app-level Throttler), and security headers. The WAF (ModSecurity or a
# managed one like Cloudflare/AWS WAF) sits in front of this, not behind it —
# see infra/waf/modsecurity-rules.conf for the ruleset this expects upstream.

worker_processes auto;

events {
    worker_connections 4096;
}

http {
    # ---- Load balancing across gateway instances ----
    # least_conn balances by active connections rather than round-robin,
    # which matters once request latency varies (e.g. an EHR call vs a
    # cheap health check).
    upstream gateway_backend {
        least_conn;
        server gateway-1:3000 max_fails=3 fail_timeout=30s;
        server gateway-2:3000 max_fails=3 fail_timeout=30s;
        server gateway-3:3000 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    # ---- Rate limiting zones ----
    # Two tiers: a generous general limit, and a much tighter one for auth
    # endpoints to blunt credential-stuffing/brute-force attempts before
    # they even reach the app-level Throttler.
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    log_format security_log '$remote_addr - $time_local "$request" '
                            '$status $body_bytes_sent "$http_referer" '
                            '"$http_user_agent" rt=$request_time';

    server {
        listen 443 ssl http2;
        server_name api.hospital-network.example;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ---- Security headers ----
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'" always;

        access_log /var/log/nginx/security.log security_log;

        limit_conn conn_limit 20; # cap concurrent connections per IP

        location /auth/login {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass http://gateway_backend;
            include /etc/nginx/proxy_params.conf;
        }

        location / {
            limit_req zone=general_limit burst=40 nodelay;
            proxy_pass http://gateway_backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /health {
            access_log off;
            proxy_pass http://gateway_backend;
        }
    }

    # Redirect all plain HTTP to HTTPS
    server {
        listen 80;
        server_name api.hospital-network.example;
        return 301 https://$host$request_uri;
    }
}
