# ModSecurity configuration — sits in the NGINX request path in front of
# the gateway. Uses the OWASP Core Rule Set (CRS) as the base ruleset;
# this file layers hospital-specific tuning on top.
#
# Install: apt install libmodsecurity3 nginx-module-modsecurity, then
# `git clone https://github.com/coreruleset/coreruleset` into
# /etc/nginx/modsecurity/crs and include it below.

SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072

# Block common injection/traversal patterns before they reach the app.
Include /etc/nginx/modsecurity/crs/crs-setup.conf
Include /etc/nginx/modsecurity/crs/rules/*.conf

# --- Hospital-specific tuning ---

# Patient/clinical payloads can be large (attachments, notes) — the default
# CRS body-size rule is tuned above; don't lower it further without checking
# real EHR payload sizes first.

# Exempt the AI receptionist's free-text chat field from the generic
# SQL-injection heuristics that otherwise false-positive on medical
# terminology (e.g. words containing "select", "union" as normal English).
SecRule REQUEST_URI "@streq /ai/receptionist/chat" \
    "id:900001,phase:1,pass,nolog,ctl:ruleRemoveById=942100"

# Always log full detail for anything touching patient records, even on
# allowed requests, to support the audit trail already written at the
# application layer.
SecRule REQUEST_URI "@rx ^/ehr/patients" \
    "id:900002,phase:1,pass,log,auditlog"
