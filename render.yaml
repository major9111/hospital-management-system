# Render Blueprint — deploy with `render blueprint launch` or by connecting
# this repo in the Render dashboard and pointing it at this file.
#
# Architecture on Render:
#   - gateway            -> type: web    (public — the ONLY internet-facing service)
#   - ehr-service         -> type: pserv  (private — reachable only from other Render
#   - ai-service          -> type: pserv     services on the same team, via internal
#   - billing-service     -> type: pserv     hostnames like http://ehr-service:8001)
#   - notification-service-> type: pserv
#   - search-sync         -> type: worker (background worker, no HTTP surface at all)
#
# Postgres = Neon (not Render-managed — set DATABASE_URL manually per service,
# using Neon's POOLED connection string, not the direct one; see README).
# Elasticsearch = external (Elastic Cloud / Bonsai — Render has no managed ES).

services:
  - type: web
    name: gateway
    runtime: node
    plan: starter
    rootDir: apps/gateway
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # paste Neon's POOLED connection string here
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: INTERNAL_SERVICE_SECRET
        generateValue: true # must be copied to every private service below too
      - key: ALLOWED_ORIGINS
        sync: false # e.g. https://your-app.vercel.app,https://your-custom-domain.com
      - key: EHR_SERVICE_URL
        value: http://ehr-service:8001 # Render private-service internal hostname
      - key: AI_SERVICE_URL
        value: http://ai-service:8002
      - key: BILLING_SERVICE_URL
        value: http://billing-service:3001

  - type: pserv
    name: ehr-service
    runtime: python
    plan: starter
    rootDir: apps/ehr-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8001
    envVars:
      - key: DATABASE_URL
        sync: false # same Neon pooled URL as gateway
      - key: INTERNAL_SERVICE_SECRET
        sync: false # must match gateway's value exactly
      - key: ELASTICSEARCH_URL
        sync: false # Elastic Cloud / Bonsai endpoint
      - key: REDIS_URL
        fromService: { name: hospital-redis, type: redis, property: connectionString }
      - key: BILLING_SERVICE_URL
        value: http://billing-service:3001 # for decrementing stock on prescription fulfillment

  - type: pserv
    name: ai-service
    runtime: python
    plan: starter
    rootDir: apps/ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8002
    envVars:
      - key: INTERNAL_SERVICE_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EHR_SERVICE_URL
        value: http://ehr-service:8001
      - key: REDIS_URL
        fromService: { name: hospital-redis, type: redis, property: connectionString }

  - type: pserv
    name: billing-service
    runtime: node
    plan: starter
    rootDir: apps/billing-service
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: DATABASE_URL
        sync: false # same Neon pooled URL, billing/inventory schemas
      - key: INTERNAL_SERVICE_SECRET
        sync: false
      - key: REDIS_HOST
        fromService: { name: hospital-redis, type: redis, property: host }
      - key: REDIS_PORT
        fromService: { name: hospital-redis, type: redis, property: port }

  - type: pserv
    name: notification-service
    runtime: node
    plan: starter
    rootDir: apps/notification-service
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: REDIS_HOST
        fromService: { name: hospital-redis, type: redis, property: host }
      - key: REDIS_PORT
        fromService: { name: hospital-redis, type: redis, property: port }

  - type: worker
    name: search-sync
    runtime: python
    plan: starter
    rootDir: apps/search-sync
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.main
    envVars:
      - key: DATABASE_URL
        sync: false # Neon — LISTEN/NOTIFY requires the DIRECT (non-pooled)
                    # connection string, not the pgbouncer one (pooled
                    # connections don't reliably support LISTEN/NOTIFY)
      - key: ELASTICSEARCH_URL
        sync: false

  - type: redis
    name: hospital-redis
    plan: starter
    ipAllowList: [] # empty = only reachable from services in this Render team
