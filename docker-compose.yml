version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hospital
      POSTGRES_PASSWORD: hospital_dev_pw
      POSTGRES_DB: hospital_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  search-sync:
    build: ./apps/search-sync
    depends_on:
      - postgres
      - elasticsearch
    environment:
      DATABASE_URL: postgresql://hospital:hospital_dev_pw@postgres:5432/hospital_db
      ELASTICSEARCH_URL: http://elasticsearch:9200
      PORT: 8003
    ports:
      - "8003:8003"
    restart: unless-stopped

  notification-service:
    build: ./apps/notification-service
    environment:
      INTERNAL_SERVICE_SECRET: local_dev_secret_change_me
      PORT: 3002
    ports:
      - "3002:3002"
    restart: unless-stopped

volumes:
  pg_data:
  es_data:
