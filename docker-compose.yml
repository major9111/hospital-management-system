version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hospital
      POSTGRES_PASSWORD: hospital_dev_pw
      POSTGRES_DB: hospital_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  search-sync:
    build: ./apps/search-sync
    depends_on:
      - postgres
      - elasticsearch
    environment:
      DATABASE_URL: postgresql://hospital:hospital_dev_pw@postgres:5432/hospital_db
      ELASTICSEARCH_URL: http://elasticsearch:9200
    restart: unless-stopped

  notification-service:
    build: ./apps/notification-service
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3002:3002"
    restart: unless-stopped

volumes:
  pg_data:
  es_data:
